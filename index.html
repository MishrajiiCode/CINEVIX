<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEVIX</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #0b0f19;
    color: white;
}

/* 🎬 Splash Screen */
#splash {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 9999;
}

#splash video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

header h1 {
    font-size: 24px;
    margin-bottom: 10px;
}

#searchBar {
    width: 90%;
    max-width: 400px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Player Section */
.player-wrapper {
    display: none;
    padding: 10px;
}

.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: black;
    border-radius: 8px;
    overflow: hidden;
}

.video-container iframe,
.video-container video {
    width: 100%;
    height: 100%;
    border: none;
}

/* Controls */
.controls {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    gap: 10px;
}

.controls button,
.controls a {
    flex: 1;
    padding: 10px;
    background: #2563eb;
    border: none;
    border-radius: 6px;
    color: white;
    text-align: center;
    cursor: pointer;
}

/* Gallery */
.video-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 15px;
    padding: 15px;
}

.video-card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.video-card:hover {
    transform: scale(1.05);
}

.video-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.video-card .info {
    padding: 10px;
}

.video-card h4 {
    font-size: 15px;
}

.timer {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(220, 38, 38, 0.9);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    z-index: 10;
}

/* Modal Styles */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #1e293b;
    padding: 24px;
    border-radius: 10px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}
.modal-content h3 {
    margin-bottom: 12px;
    color: #ef4444;
}
.modal-content p {
    margin-bottom: 20px;
    font-size: 15px;
    color: #cbd5e1;
}
.modal-content button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    width: 100%;
}
.modal-content button:hover {
    background: #2563eb;
}

/* Mobile */
@media(max-width:600px){
    header h1 {
        font-size: 20px;
    }

    .video-gallery {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- 🎬 Splash -->
<div id="splash">
    <video autoplay muted>
        <source src="v.mp4" type="video/mp4">
    </video>
</div>

<header>
    <h1>🎬Wellcome to CineVix Powered by Quizify</h1>
    <input type="text" id="searchBar" placeholder="Search videos...">
</header>

<!-- 🎥 Player -->
<div class="player-wrapper" id="playerWrapper">

    <button onclick="closePlayer()">⬅ Back</button>

    <div class="video-container" id="videoContainer"></div>

    <div class="controls">
        <button onclick="bookmarkVideo()">❤️ Bookmark</button>
        <a id="downloadBtn" target="_blank">⬇ Download</a>
    </div>

</div>

<!-- 🎞 Gallery -->
<div class="video-gallery" id="videoGallery"></div>

<!-- Custom Modal -->
<div id="customModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Notice</h3>
        <p id="modalMessage"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
    apiKey: "AIzaSyAy-7QGZ05wNf0fLG1-AY2FxJy_fdILdoM",
    authDomain: "quizifyapp-4c5ca.firebaseapp.com",
    projectId: "quizifyapp-4c5ca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DOM Elements */
const gallery = document.getElementById("videoGallery");
const player = document.getElementById("playerWrapper");
const container = document.getElementById("videoContainer");
const downloadBtn = document.getElementById("downloadBtn");

let currentTitle = "";

/* 🎬 Splash hide */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
},12000);

/* 🔍 Search */
document.getElementById("searchBar").addEventListener("input",(e)=>{
    const value = e.target.value.toLowerCase();
    document.querySelectorAll(".video-card").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
});

/* ❤️ Bookmark */
window.bookmarkVideo = function(){
    let list = JSON.parse(localStorage.getItem("bookmarks")) || [];
    list.push(currentTitle);
    localStorage.setItem("bookmarks", JSON.stringify(list));
    alert("Bookmarked!");
}

/* ⬅ Close Player */
window.closePlayer = function(){
    player.style.display = "none";
    gallery.style.display = "grid";
    container.innerHTML = "";
}

/* 🎥 Get Video URL */
function getVideoURL(data){

    if(data.platform === "youtube"){
        return `https://www.youtube.com/embed/${data.videoId}`;
    }

    if(data.driveVideoId){
        return `https://drive.google.com/file/d/${data.driveVideoId}/preview`;
    }

    if(data.videoUrl){
        return data.videoUrl;
    }

    return null;
}

/* Custom Modal */
window.showModal = function(message) {
    document.getElementById('modalMessage').innerText = message;
    document.getElementById('customModal').style.display = 'flex';
}

window.closeModal = function() {
    document.getElementById('customModal').style.display = 'none';
}

/* 📡 Fetch Videos */
const q = query(collection(db,"videos"), orderBy("createdAt","desc"));

onSnapshot(q,(snapshot)=>{
    gallery.innerHTML = "";

    // Clear existing intervals
    if (window.timerIntervals) window.timerIntervals.forEach(clearInterval);
    window.timerIntervals = [];

    snapshot.forEach(doc=>{
        const data = doc.data();

        const card = document.createElement("div");
        card.className = "video-card";
        
        const now = Date.now();
        const createdAt = data.createdAt || 0;
        const lockTime = 200 * 60 * 1000;
        let isLocked = (now - createdAt) < lockTime;
        let timerHTML = isLocked ? `<div class="timer" id="timer-${doc.id}"></div>` : '';
        let timerInterval;

        card.innerHTML = `
            <img src="${data.thumbnail}" />
            ${timerHTML}
            <div class="info">
                <h4>${data.title}</h4>
            </div>
        `;

        if (isLocked) {
            const timerEl = card.querySelector(`#timer-${doc.id}`);
            const updateTimer = () => {
                const currentNow = Date.now();
                const remaining = lockTime - (currentNow - createdAt);
                
                if (remaining <= 0) {
                    isLocked = false;
                    if (timerEl) timerEl.style.display = 'none';
                    if (timerInterval) clearInterval(timerInterval);
                } else {
                    const mins = Math.floor(remaining / 1000 / 60);
                    const secs = Math.floor((remaining / 1000) % 60);
                    if (timerEl) timerEl.innerText = `Available in ${mins}m ${secs}s`;
                }
            };
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
            window.timerIntervals.push(timerInterval);
        }

        card.onclick = ()=>{
            if (isLocked) {
                const currentNow = Date.now();
                const remaining = lockTime - (currentNow - createdAt);
                const mins = Math.ceil(remaining / 1000 / 60);
                showModal(`Wait for ${mins} min, come after ${mins} min.`);
                return;
            }

            const url = getVideoURL(data);
            currentTitle = data.title;

            gallery.style.display = "none";
            player.style.display = "block";

            if(url.includes("youtube") || url.includes("drive")){
                container.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `
                    <video controls autoplay>
                        <source src="${url}">
                    </video>`;
            }

            downloadBtn.href = url;

            window.scrollTo({top:0,behavior:"smooth"});
        };

        gallery.appendChild(card);
    });
});
</script>

</body>
</html>
