<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Photos Link</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        .photo-container {
            position: relative;
            width: 350px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            text-decoration: none;
            background-color: #000;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease-in-out;
        }
        .photo-container::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: white;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            opacity: 0.8;
            transition: opacity 0.3s ease-in-out;
        }
        .photo-container:hover img {
            transform: scale(1.1);
        }
        .photo-container:hover::after {
            opacity: 1;
        }
        .caption {
            color: #555;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .video-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 15px 10px 10px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>My Video Gallery</h1>

    <p class="caption" id="loading-text">Fetching latest link from database...</p>
    
    <!-- Gallery container where all videos will be loaded -->
    <div class="gallery" id="video-gallery"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAy-7QGZ05wNf0fLG1-AY2FxJy_fdILdoM",
            authDomain: "quizifyapp-4c5ca.firebaseapp.com",
            projectId: "quizifyapp-4c5ca",
            storageBucket: "quizifyapp-4c5ca.firebasestorage.app",
            messagingSenderId: "948606346917",
            appId: "1:948606346917:web:ab385f7753da5c20710f4c",
            measurementId: "G-C8BJ139KHE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch all links, ordered by newest first (removed limit(1))
        const q = query(collection(db, "shared_links"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById('video-gallery');
            gallery.innerHTML = ''; // Clear gallery before updating to prevent duplicates
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Create the wrapper <a> tag
                const anchor = document.createElement('a');
                anchor.href = data.url;
                anchor.target = "_blank";
                anchor.rel = "noopener noreferrer";
                anchor.className = "photo-container";

                // Create the Image
                anchor.innerHTML = `
                    <img src="${data.thumbnailUrl}" alt="${data.title}">
                    <div class="video-title">${data.title}</div>
                `;

                // Add to gallery
                gallery.appendChild(anchor);
            });
            
            // Hide the loading text once data is fetched
            document.getElementById('loading-text').style.display = 'none';
        });
    </script>
</body>
</html>
